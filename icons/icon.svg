<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#C2683F"/>
      <stop offset="1" stop-color="#A2522F"/>
    </linearGradient>
  </defs>
  <!-- full-bleed background so Android can mask it (maskable) -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- safe zone is the inner ~70% (roughly 76px margin each side) -->
  <!-- folded paper / news-sheet glyph -->
  <g>
    <path d="M146 124 H336 a14 14 0 0 1 14 14 V374 a14 14 0 0 1 -14 14
             H166 a14 14 0 0 1 -14 -14 V124 Z"
          fill="#F7F4EC"/>
    <!-- folded corner -->
    <path d="M336 124 L380 168 H350 a14 14 0 0 1 -14 -14 Z" fill="#EFE9DB"/>

    <!-- headline block -->
    <rect x="178" y="160" width="120" height="16" rx="3" fill="#C2683F"/>
    <!-- text lines -->
    <rect x="178" y="196" width="156" height="9" rx="3" fill="#B08322" opacity=".85"/>
    <rect x="178" y="216" width="156" height="9" rx="3" fill="#8C8273"/>
    <rect x="178" y="236" width="120" height="9" rx="3" fill="#8C8273"/>

    <rect x="178" y="264" width="156" height="9" rx="3" fill="#8C8273"/>
    <rect x="178" y="284" width="156" height="9" rx="3" fill="#8C8273"/>
    <rect x="178" y="304" width="96" height="9" rx="3" fill="#8C8273"/>

    <rect x="178" y="332" width="156" height="9" rx="3" fill="#8C8273"/>
    <rect x="178" y="352" width="132" height="9" rx="3" fill="#8C8273"/>
  </g>

  <!-- brand mark dot, echoing the site header's accent dot -->
  <circle cx="362" cy="150" r="13" fill="#B08322"/>
</svg>
