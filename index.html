<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily News 모음</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=Pretendard-Regular:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F4EC;            /* 따뜻한 종이톤 배경 */
    --bg-deep:#F0EBDF;
    --card:#FFFFFF;
    --card-alt:#FBF8F1;
    --border:#E6DFD0;
    --border-soft:#EFE9DB;
    --text:#2B2722;          /* 차분한 다크 브라운 */
    --text-soft:#564F45;
    --muted:#8C8273;
    --accent:#C2683F;        /* 클로드 톤의 테라코타 */
    --accent-deep:#A2522F;
    --accent-light:#F1E1D0;
    --chip:#EFE8D9;
    --star:#B08322;
    --ring: rgba(194,104,63,.22);
    --serif: "Noto Serif KR", Georgia, "Apple SD Gothic Neo", serif;
    --sans: "Pretendard-Regular", -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:var(--sans);
    background:var(--bg); color:var(--text);
    -webkit-font-smoothing:antialiased;
  }
  header{
    background:var(--bg);
    border-bottom:1px solid var(--border);
    padding:22px 28px 18px;
    position:sticky; top:0; z-index:10;
  }
  .header-top{display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px;}
  .header-top h1{
    margin:0; font-size:21px; font-family:var(--serif); font-weight:700;
    color:var(--text); letter-spacing:.2px; display:flex; align-items:center; gap:8px;
  }
  .header-top h1 .mark{
    display:inline-block; width:9px; height:9px; border-radius:50%;
    background:var(--accent);
  }
  .auth-area{display:flex; align-items:center; gap:8px; font-size:13px;}
  .auth-area .user-name{color:var(--text-soft); font-weight:500;}
  .btn{
    padding:7px 14px; border-radius:8px; border:1px solid var(--border);
    background:var(--card); font-size:13px; cursor:pointer; color:var(--text-soft);
    font-family:var(--sans); transition:background .15s, border-color .15s;
  }
  .btn:hover{background:var(--chip);}
  .btn-primary{background:var(--accent); border-color:var(--accent); color:#fff;}
  .btn-primary:hover{background:var(--accent-deep);}
  .controls{display:flex; flex-wrap:wrap; gap:10px; align-items:center;}
  .controls input[type="search"]{
    flex:1; min-width:200px; padding:10px 14px; border:1px solid var(--border);
    border-radius:9px; font-size:14px; background:var(--card); color:var(--text);
    font-family:var(--sans); outline:none; transition:box-shadow .15s, border-color .15s;
  }
  .controls input[type="search"]:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--ring);}
  select{
    padding:9px 10px; border:1px solid var(--border); border-radius:9px;
    font-size:14px; background:var(--card); color:var(--text); font-family:var(--sans);
    outline:none;
  }
  select:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--ring);}
  .chip-row{display:flex; flex-wrap:wrap; gap:7px; margin-top:11px;}
  .chip{
    padding:5px 13px; border-radius:999px; border:1px solid var(--border);
    background:var(--chip); font-size:13px; cursor:pointer; user-select:none;
    color:var(--text-soft); transition:background .15s, color .15s, border-color .15s;
  }
  .chip.active{background:var(--accent); border-color:var(--accent); color:#fff;}
  .chip.scrap-chip{border-color:#E3CD93; color:var(--star); background:#FBF3DE;}
  .chip.scrap-chip.active{background:var(--star); border-color:var(--star); color:#fff;}
  .chip.disabled{opacity:.45; cursor:not-allowed;}
  main{padding:26px 28px 40px; max-width:760px; margin:0 auto;}
  .meta-bar{color:var(--muted); font-size:13px; margin-bottom:16px; font-family:var(--sans);}
  .article{
    background:var(--card); border:1px solid var(--border-soft); border-radius:12px;
    padding:22px 26px; margin-bottom:18px; position:relative;
    box-shadow:0 1px 2px rgba(43,39,34,.04);
  }
  .article-head{display:flex; justify-content:space-between; align-items:flex-start; gap:12px; flex-wrap:wrap;}
  .article h3{
    margin:0; font-size:18.5px; line-height:1.5; flex:1; font-family:var(--serif);
    font-weight:700; color:var(--text);
  }
  .head-right{display:flex; align-items:center; gap:9px; padding-top:2px;}
  .tag{
    display:inline-block; font-size:11.5px; padding:3px 10px; border-radius:6px;
    background:var(--accent-light); color:var(--accent-deep); font-weight:600; white-space:nowrap;
    font-family:var(--sans);
  }
  .scrap-btn{
    background:none; border:none; cursor:pointer; font-size:19px; line-height:1;
    color:#D8CFBE; padding:0 2px; transition:color .15s, transform .1s;
  }
  .scrap-btn:hover{transform:scale(1.1);}
  .scrap-btn.scrapped{color:var(--star);}
  .scrap-btn:disabled{cursor:not-allowed; opacity:.4;}
  .article-sub{
    font-size:12.5px; color:var(--muted); margin:8px 0 14px; font-family:var(--sans);
    border-bottom:1px solid var(--border-soft); padding-bottom:12px;
  }
  .article-body{font-size:15.5px; line-height:1.85; color:var(--text-soft); font-family:var(--serif);}
  .article-link{margin-top:14px;}
  .article a{color:var(--accent-deep); text-decoration:none; font-size:13px; font-family:var(--sans); font-weight:600;}
  .article a:hover{text-decoration:underline;}
  .article a.source-link{color:var(--muted); font-weight:500;}
  mark{background:var(--accent-light); color:var(--accent-deep); border-radius:3px; padding:0 2px;}
  .empty{text-align:center; color:var(--muted); padding:70px 0; font-size:14px; font-family:var(--serif);}
  footer{text-align:center; color:var(--muted); font-size:12px; padding:26px; font-family:var(--sans);}

  .modal-overlay{
    position:fixed; inset:0; background:rgba(43,39,34,0.45);
    display:none; align-items:center; justify-content:center; z-index:100; padding:16px;
  }
  .modal-overlay.open{display:flex;}
  .modal-box{
    background:var(--card); border-radius:14px; padding:26px; width:100%; max-width:340px;
    box-shadow:0 12px 32px rgba(43,39,34,.18);
  }
  .modal-box h2{margin:0 0 4px; font-size:18px; font-family:var(--serif); color:var(--text);}
  .modal-sub{color:var(--muted); font-size:13px; margin:0 0 18px; font-family:var(--sans);}
  .modal-box label{font-size:13px; color:var(--text-soft); display:block; margin-bottom:5px; font-family:var(--sans);}
  .modal-box input{
    width:100%; padding:10px 12px; border:1px solid var(--border); border-radius:9px;
    font-size:14px; margin-bottom:13px; font-family:var(--sans); outline:none;
  }
  .modal-box input:focus{border-color:var(--accent); box-shadow:0 0 0 3px var(--ring);}
  .modal-error{color:#A23B2E; font-size:12.5px; margin:-4px 0 12px; min-height:14px; font-family:var(--sans);}
  .modal-actions{display:flex; gap:8px; margin-top:4px;}
  .modal-actions .btn{flex:1;}
  .modal-switch{text-align:center; margin-top:16px; font-size:13px; color:var(--muted); font-family:var(--sans);}
  .modal-switch a{color:var(--accent-deep); cursor:pointer; text-decoration:none; font-weight:600;}
  .modal-close{
    position:absolute; top:14px; right:16px; cursor:pointer; color:var(--muted);
    background:none; border:none; font-size:18px;
  }
  @media (max-width:600px){
    header{padding:16px 18px 14px;}
    main{padding:18px 16px 32px;}
    .article{padding:18px 18px;}
  }
</style>
</head>
<body>
<header>
  <div class="header-top">
    <h1>📰 Daily News 모음</h1>
    <div class="auth-area" id="authArea"></div>
  </div>
  <div class="controls">
    <input type="search" id="searchInput" placeholder="제목·본문·출처 검색...">
    <select id="dateSelect">
      <option value="">전체 날짜</option>
    </select>
  </div>
  <div class="chip-row" id="categoryChips"></div>
  <div class="chip-row">
    <div class="chip scrap-chip" id="scrapChip">⭐ 스크랩한 뉴스만 보기</div>
  </div>
</header>
<main>
  <div class="meta-bar" id="resultCount"></div>
  <div id="articleList"></div>
</main>
<footer>총 <span id="totalCount">0</span>건의 뉴스 · CLAUDE 폴더 자동 생성</footer>

<div class="modal-overlay" id="authModal">
  <div class="modal-box">
    <button class="modal-close" id="modalCloseBtn">✕</button>
    <h2 id="modalTitle">로그인</h2>
    <p class="modal-sub" id="modalSub">닉네임과 비밀번호를 입력해주세요.</p>
    <label for="authNickname">닉네임</label>
    <input type="text" id="authNickname" autocomplete="username" maxlength="20">
    <label for="authPassword">비밀번호</label>
    <input type="password" id="authPassword" autocomplete="current-password" maxlength="50">
    <div class="modal-error" id="authError"></div>
    <div class="modal-actions">
      <button class="btn btn-primary" id="authSubmitBtn">로그인</button>
    </div>
    <div class="modal-switch" id="modalSwitch">
      계정이 없으신가요? <a id="switchModeLink">회원가입</a>
    </div>
  </div>
</div>

<script>
const CATEGORY_ICONS = {
  "정치":"🏛️","국제":"🌍","경제":"💰","사회":"🚨","문화":"🎭",
  "스포츠":"⚽","IT":"💻","과학":"🚀","교육":"🎓","비지니스":"📊","수학":"📐"
};

const LS_CURRENT_USER = "dn_currentUser";

let allArticles = [];
let activeCategories = new Set();
let scrapOnly = false;
let authMode = "login"; // or "register"
let currentScraps = new Set(); // 로그인한 사용자의 스크랩 캐시 (서버와 동기화됨)

/* ---------- 인증 / 스크랩 저장소 (서버 API + Upstash Redis) ---------- */

async function apiCall(path, options){
  const res = await fetch(path, options);
  let data;
  try { data = await res.json(); }
  catch { data = { ok:false, error:"서버 응답을 처리할 수 없습니다." }; }
  if (!res.ok && !data.error) data.error = "요청 처리 중 오류가 발생했습니다.";
  return data;
}

function getCurrentUser(){
  return localStorage.getItem(LS_CURRENT_USER) || null;
}
function setCurrentUser(nickname){
  if (nickname) localStorage.setItem(LS_CURRENT_USER, nickname);
  else localStorage.removeItem(LS_CURRENT_USER);
}

async function loadScrapsForCurrentUser(){
  const user = getCurrentUser();
  if (!user){ currentScraps = new Set(); return; }
  try {
    const data = await apiCall(`/api/scraps?nickname=${encodeURIComponent(user)}`);
    currentScraps = new Set(data.ok ? (data.articleIds || []) : []);
  } catch {
    currentScraps = new Set();
  }
}

async function persistScraps(){
  const user = getCurrentUser();
  if (!user) return;
  await apiCall('/api/scraps', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ nickname: user, articleIds: [...currentScraps] }),
  });
}

async function toggleScrap(articleId){
  const user = getCurrentUser();
  if (!user) { openAuthModal("login"); return; }
  if (currentScraps.has(articleId)) currentScraps.delete(articleId);
  else currentScraps.add(articleId);
  render(); // 즉시 화면 갱신 (낙관적 업데이트)
  await persistScraps();
}

/* ---------- 모달 ---------- */

function openAuthModal(mode){
  authMode = mode;
  document.getElementById('authError').textContent = '';
  document.getElementById('authNickname').value = '';
  document.getElementById('authPassword').value = '';
  const isLogin = mode === 'login';
  document.getElementById('modalTitle').textContent = isLogin ? '로그인' : '회원가입';
  document.getElementById('modalSub').textContent = isLogin
    ? '닉네임과 비밀번호를 입력해주세요.'
    : '사용할 닉네임과 비밀번호를 정해주세요.';
  document.getElementById('authSubmitBtn').textContent = isLogin ? '로그인' : '가입하기';
  document.getElementById('modalSwitch').innerHTML = isLogin
    ? '계정이 없으신가요? <a id="switchModeLink">회원가입</a>'
    : '이미 계정이 있으신가요? <a id="switchModeLink">로그인</a>';
  document.getElementById('switchModeLink').addEventListener('click', () => {
    openAuthModal(isLogin ? 'register' : 'login');
  });
  document.getElementById('authModal').classList.add('open');
  document.getElementById('authNickname').focus();
}
function closeAuthModal(){
  document.getElementById('authModal').classList.remove('open');
}

async function handleAuthSubmit(){
  const nickname = document.getElementById('authNickname').value.trim();
  const password = document.getElementById('authPassword').value;
  const errorEl = document.getElementById('authError');
  const submitBtn = document.getElementById('authSubmitBtn');

  if (!nickname || !password){
    errorEl.textContent = '닉네임과 비밀번호를 모두 입력해주세요.';
    return;
  }

  submitBtn.disabled = true;
  errorEl.textContent = '';

  try {
    const endpoint = authMode === 'register' ? '/api/register' : '/api/login';
    const data = await apiCall(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nickname, password }),
    });

    if (!data.ok){
      errorEl.textContent = data.error || '처리 중 오류가 발생했습니다.';
      submitBtn.disabled = false;
      return;
    }

    setCurrentUser(data.nickname || nickname);
    await loadScrapsForCurrentUser();
    closeAuthModal();
    renderAuthArea();
    render();
  } catch {
    errorEl.textContent = '서버에 연결할 수 없습니다. 잠시 후 다시 시도해주세요.';
  } finally {
    submitBtn.disabled = false;
  }
}

function logout(){
  setCurrentUser(null);
  currentScraps = new Set();
  scrapOnly = false;
  renderAuthArea();
  render();
}

function renderAuthArea(){
  const area = document.getElementById('authArea');
  const user = getCurrentUser();
  if (user){
    area.innerHTML = `
      <span class="user-name">👤 ${escapeHtml(user)}님</span>
      <button class="btn" id="logoutBtn">로그아웃</button>
    `;
    document.getElementById('logoutBtn').addEventListener('click', logout);
  } else {
    area.innerHTML = `<button class="btn btn-primary" id="loginBtn">로그인 / 회원가입</button>`;
    document.getElementById('loginBtn').addEventListener('click', () => openAuthModal('login'));
  }
  // 로그아웃 상태면 스크랩 필터 비활성화
  const scrapChip = document.getElementById('scrapChip');
  if (!user){
    scrapOnly = false;
    scrapChip.classList.remove('active');
    scrapChip.classList.add('disabled');
  } else {
    scrapChip.classList.remove('disabled');
  }
}

/* ---------- 메인 렌더링 ---------- */

async function init(){
  const res = await fetch('articles.json');
  allArticles = await res.json();

  const dates = [...new Set(allArticles.map(a => a.fileDate))].sort().reverse();
  const dateSelect = document.getElementById('dateSelect');
  for (const d of dates){
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    dateSelect.appendChild(opt);
  }

  const cats = [...new Set(allArticles.map(a => a.category))];
  const orderRef = Object.keys(CATEGORY_ICONS);
  cats.sort((a,b) => orderRef.indexOf(a) - orderRef.indexOf(b));
  const chipRow = document.getElementById('categoryChips');
  for (const c of cats){
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.textContent = `${CATEGORY_ICONS[c]||''} ${c}`;
    chip.dataset.cat = c;
    chip.addEventListener('click', () => {
      if (activeCategories.has(c)){
        activeCategories.delete(c); chip.classList.remove('active');
      } else {
        activeCategories.add(c); chip.classList.add('active');
      }
      render();
    });
    chipRow.appendChild(chip);
  }

  document.getElementById('searchInput').addEventListener('input', render);
  dateSelect.addEventListener('change', render);

  document.getElementById('scrapChip').addEventListener('click', () => {
    if (!getCurrentUser()){ openAuthModal('login'); return; }
    scrapOnly = !scrapOnly;
    document.getElementById('scrapChip').classList.toggle('active', scrapOnly);
    render();
  });

  document.getElementById('authSubmitBtn').addEventListener('click', handleAuthSubmit);
  document.getElementById('authPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') handleAuthSubmit();
  });
  document.getElementById('modalCloseBtn').addEventListener('click', closeAuthModal);
  document.getElementById('authModal').addEventListener('click', e => {
    if (e.target.id === 'authModal') closeAuthModal();
  });

  await loadScrapsForCurrentUser();
  renderAuthArea();
  document.getElementById('totalCount').textContent = allArticles.length;
  render();
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function highlight(text, term){
  if (!term) return escapeHtml(text);
  const escaped = escapeHtml(text);
  const safeTerm = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return escaped.replace(new RegExp(safeTerm, 'gi'), m => `<mark>${m}</mark>`);
}

/* 링크가 기사 본문의 정확한 주소인지, 단순 출처 사이트(홈/섹션) 주소인지 추정.
   경로가 거의 없거나 짧고 숫자 ID도 없으면 "일반 출처 사이트"로 간주. */
function isSpecificArticleLink(url){
  try {
    const u = new URL(url);
    const path = u.pathname.replace(/\/+$/, '');
    if (!path || path === '') return false;
    const segments = path.split('/').filter(Boolean);
    const hasLongId = /\d{4,}/.test(path);
    if (segments.length >= 2) return true;
    if (segments.length === 1 && (segments[0].length > 20 || hasLongId)) return true;
    return false;
  } catch {
    return false;
  }
}

function render(){
  const term = document.getElementById('searchInput').value.trim();
  const date = document.getElementById('dateSelect').value;
  const user = getCurrentUser();
  const scraps = currentScraps;

  let filtered = allArticles.filter(a => {
    if (date && a.fileDate !== date) return false;
    if (activeCategories.size > 0 && !activeCategories.has(a.category)) return false;
    if (scrapOnly && !scraps.has(a.id)) return false;
    if (term){
      const hay = (a.title + ' ' + a.body + ' ' + a.source).toLowerCase();
      if (!hay.includes(term.toLowerCase())) return false;
    }
    return true;
  });

  filtered.sort((a,b) => (b.fileDate.localeCompare(a.fileDate)) || (a.id - b.id));

  const list = document.getElementById('articleList');
  document.getElementById('resultCount').textContent =
    `${filtered.length}건 표시 중` + (scrapOnly ? ' (스크랩만)' : '');

  if (filtered.length === 0){
    list.innerHTML = `<div class="empty">${scrapOnly ? '스크랩한 뉴스가 없습니다.' : '조건에 맞는 뉴스가 없습니다.'}</div>`;
    return;
  }

  list.innerHTML = filtered.map(a => {
    const isScrapped = scraps.has(a.id);
    return `
    <div class="article">
      <div class="article-head">
        <h3>${highlight(a.title, term)}</h3>
        <div class="head-right">
          <span class="tag">${CATEGORY_ICONS[a.category]||''} ${a.category}</span>
          <button class="scrap-btn ${isScrapped ? 'scrapped' : ''}" data-id="${a.id}" title="${user ? '스크랩' : '로그인 후 이용 가능'}">${isScrapped ? '★' : '☆'}</button>
        </div>
      </div>
      <div class="article-sub">${a.fileDate} · ${escapeHtml(a.source)} ${a.date ? '· ' + escapeHtml(a.date) : ''}</div>
      <div class="article-body">${highlight(a.body, term)}</div>
      ${a.link ? renderLink(a.link) : ''}
    </div>
  `;
  }).join('');

  function renderLink(link){
    const specific = isSpecificArticleLink(link);
    const label = specific ? '원문 보기 →' : '출처 사이트 보기 →';
    const cls = specific ? '' : 'source-link';
    return `<div class="article-link"><a class="${cls}" href="${escapeHtml(link)}" target="_blank" rel="noopener">${label}</a></div>`;
  }

  list.querySelectorAll('.scrap-btn').forEach(btn => {
    btn.addEventListener('click', () => toggleScrap(Number(btn.dataset.id)));
  });
}

init();
</script>
</body>
</html>
