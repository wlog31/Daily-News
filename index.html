<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Daily News 모음</title>
<link rel="icon" type="image/svg+xml" href="/icons/icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="manifest" href="/site.webmanifest">
<meta name="theme-color" content="#C2683F">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F7F4EC; --card:#FFFFFF; --card-soft:#FBF8F1; --border:#E6DFD0;
    --border-soft:#EFE9DB; --text:#2B2722; --text-soft:#564F45; --muted:#8C8273;
    --accent:#C2683F; --accent-deep:#A2522F; --accent-light:#F1E1D0;
    --star:#B08322; --ring:rgba(194,104,63,.22);
    --serif:"Noto Serif KR", Georgia, "Apple SD Gothic Neo", serif;
    --sans:-apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:var(--sans);-webkit-font-smoothing:antialiased}
  header{position:sticky;top:0;z-index:10;background:var(--bg);border-bottom:1px solid var(--border);padding:22px 28px 18px}
  .header-top{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:14px}
  h1{margin:0;font:700 21px/1.3 var(--serif);display:flex;align-items:center;gap:8px}
  h1::before{content:"";width:9px;height:9px;border-radius:50%;background:var(--accent)}
  .auth-area{display:flex;align-items:center;gap:8px;font-size:13px}
  .user-name{color:var(--text-soft);font-weight:600}
  .btn{padding:7px 14px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text-soft);font:500 13px var(--sans);cursor:pointer}
  .btn:hover{background:#EFE8D9}
  .btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn-primary:hover{background:var(--accent-deep)}
  .controls{display:flex;flex-wrap:wrap;gap:10px;align-items:center}
  input[type="search"],select{border:1px solid var(--border);border-radius:9px;background:var(--card);color:var(--text);font:14px var(--sans);outline:none}
  input[type="search"]{flex:1;min-width:210px;padding:10px 14px}
  select{padding:9px 10px}
  input[type="search"]:focus,select:focus,input[type="text"]:focus,input[type="password"]:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--ring)}
  .chip-row{display:flex;flex-wrap:wrap;gap:7px;margin-top:11px}
  .chip{padding:5px 13px;border-radius:999px;border:1px solid var(--border);background:#EFE8D9;color:var(--text-soft);font-size:13px;cursor:pointer;user-select:none}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .chip.scrap-chip{border-color:#E3CD93;color:var(--star);background:#FBF3DE}
  .chip.scrap-chip.active{background:var(--star);border-color:var(--star);color:#fff}
  main{max-width:760px;margin:0 auto;padding:26px 28px 40px}
  .meta-bar{color:var(--muted);font-size:13px;margin-bottom:16px}
  .article{background:var(--card);border:1px solid var(--border-soft);border-radius:12px;padding:22px 26px;margin-bottom:18px;box-shadow:0 1px 2px rgba(43,39,34,.04)}
  .article-head{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .article h3{margin:0;font:700 18.5px/1.5 var(--serif);flex:1}
  .head-right{display:flex;align-items:center;gap:9px;padding-top:2px}
  .tag{font-size:11.5px;padding:3px 10px;border-radius:6px;background:var(--accent-light);color:var(--accent-deep);font-weight:700;white-space:nowrap}
  .scrap-btn{background:none;border:0;cursor:pointer;font-size:21px;line-height:1;color:#D8CFBE;padding:0 2px}
  .scrap-btn.scrapped{color:var(--star)}
  .article-sub{font-size:12.5px;color:var(--muted);margin:8px 0 14px;border-bottom:1px solid var(--border-soft);padding-bottom:12px}
  .article-body{font:15.5px/1.85 var(--serif);color:var(--text-soft);white-space:pre-wrap}
  .article-link{margin-top:14px}
  a{color:var(--accent-deep);text-decoration:none;font-size:13px;font-weight:700}
  a:hover{text-decoration:underline}
  mark{background:var(--accent-light);color:var(--accent-deep);border-radius:3px;padding:0 2px}
  .empty{text-align:center;color:var(--muted);padding:70px 0;font:15px var(--serif)}
  footer{text-align:center;color:var(--muted);font-size:12px;padding:26px}
  .modal-overlay{position:fixed;inset:0;background:rgba(43,39,34,.45);display:none;align-items:center;justify-content:center;z-index:100;padding:16px}
  .modal-overlay.open{display:flex}
  .modal-box{position:relative;background:var(--card);border-radius:14px;padding:26px;width:100%;max-width:340px;box-shadow:0 12px 32px rgba(43,39,34,.18)}
  .modal-box h2{margin:0 0 4px;font:700 18px var(--serif)}
  .modal-sub{color:var(--muted);font-size:13px;margin:0 0 18px}
  .modal-box label{font-size:13px;color:var(--text-soft);display:block;margin-bottom:5px}
  .modal-box input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:9px;font-size:14px;margin-bottom:13px;outline:none}
  .modal-error{color:#A23B2E;font-size:12.5px;margin:-4px 0 12px;min-height:14px}
  .modal-actions{display:flex;gap:8px;margin-top:4px}
  .modal-actions .btn{flex:1}
  .modal-switch{text-align:center;margin-top:16px;font-size:13px;color:var(--muted)}
  .modal-switch a{color:var(--accent-deep);cursor:pointer;font-weight:700}
  .modal-close{position:absolute;top:12px;right:14px;cursor:pointer;color:var(--muted);background:none;border:0;font-size:22px;line-height:1}
  @media (max-width:600px){header{padding:16px 18px 14px}main{padding:18px 16px 32px}.article{padding:18px}.article-head{flex-direction:column}.head-right{width:100%;justify-content:space-between}}
</style>
</head>
<body>
<header>
  <div class="header-top">
    <h1>Daily News 모음</h1>
    <div class="auth-area" id="authArea"></div>
  </div>
  <div class="controls">
    <input type="search" id="searchInput" placeholder="제목, 본문, 출처 검색...">
    <select id="dateSelect"><option value="">전체 날짜</option></select>
  </div>
  <div class="chip-row" id="categoryChips"></div>
  <div class="chip-row"><div class="chip scrap-chip" id="scrapChip">스크랩한 뉴스만 보기</div></div>
</header>
<main>
  <div class="meta-bar" id="resultCount">불러오는 중...</div>
  <div id="articleList"></div>
</main>
<footer>총 <span id="totalCount">0</span>건의 뉴스</footer>

<div class="modal-overlay" id="authModal">
  <div class="modal-box">
    <button class="modal-close" id="modalCloseBtn" type="button" aria-label="닫기">&times;</button>
    <h2 id="modalTitle">로그인</h2>
    <p class="modal-sub" id="modalSub">닉네임과 비밀번호를 입력해 주세요.</p>
    <label for="authNickname">닉네임</label>
    <input type="text" id="authNickname" autocomplete="username" maxlength="20">
    <label for="authPassword">비밀번호</label>
    <input type="password" id="authPassword" autocomplete="current-password" maxlength="50">
    <div class="modal-error" id="authError"></div>
    <div class="modal-actions"><button class="btn btn-primary" id="authSubmitBtn" type="button">로그인</button></div>
    <div class="modal-switch" id="modalSwitch"></div>
  </div>
</div>

<script>
const CATEGORY_ICONS = {
  "정치":"정치", "국제":"국제", "경제":"경제", "사회":"사회", "문화":"문화",
  "스포츠":"스포츠", "IT":"IT", "과학":"과학", "교육":"교육", "비지니스":"비즈", "수학":"수학"
};
const LS_CURRENT_USER = "dn_currentUser";
const DATA_INDEX_PATH = "/data/articles/index.json";
const DATA_ALL_PATH = "/data/articles/all.json";

let allArticles = [];
let articleIndex = null;
let articleCache = new Map();
let activeCategories = new Set();
let scrapOnly = false;
let authMode = "login";
let currentScraps = new Set();
let renderToken = 0;

async function apiCall(path, options){
  const res = await fetch(path, options);
  let data;
  try { data = await res.json(); }
  catch { data = { ok:false, error:"서버 응답을 처리할 수 없습니다." }; }
  if (!res.ok && !data.error) data.error = "요청 처리 중 오류가 발생했습니다.";
  return data;
}

async function fetchArticleJson(path){
  if (articleCache.has(path)) return articleCache.get(path);

  const res = await fetch(path);
  const data = await res.json();
  if (!res.ok || !Array.isArray(data)) {
    throw new Error(data.error || "기사 데이터를 불러오지 못했습니다.");
  }

  articleCache.set(path, data);
  return data;
}

function getDateDataPath(date){
  return articleIndex?.dates.find(item => item.date === date)?.path || `/data/articles/dates/${encodeURIComponent(date)}.json`;
}

function getCategoryDataPath(category){
  return articleIndex?.categories.find(item => item.category === category)?.path || `/data/articles/categories/${encodeURIComponent(category)}.json`;
}

function uniqueArticlesById(groups){
  const seen = new Set();
  const merged = [];

  groups.flat().forEach(article => {
    if (seen.has(article.id)) return;
    seen.add(article.id);
    merged.push(article);
  });

  return merged;
}

async function loadArticlesForCurrentFilters(){
  const date = document.getElementById("dateSelect").value;
  const categories = [...activeCategories];

  if (date) {
    return fetchArticleJson(getDateDataPath(date));
  }

  if (categories.length > 0) {
    const groups = await Promise.all(categories.map(category => fetchArticleJson(getCategoryDataPath(category))));
    return uniqueArticlesById(groups);
  }

  return fetchArticleJson(DATA_ALL_PATH);
}

function getCurrentUser(){ return localStorage.getItem(LS_CURRENT_USER) || null; }
function setCurrentUser(nickname){
  if (nickname) localStorage.setItem(LS_CURRENT_USER, nickname);
  else localStorage.removeItem(LS_CURRENT_USER);
}

async function loadScrapsForCurrentUser(){
  const user = getCurrentUser();
  if (!user){ currentScraps = new Set(); return; }
  try {
    const data = await apiCall(`/api/scraps?nickname=${encodeURIComponent(user)}`);
    currentScraps = new Set(data.ok ? (data.articleIds || []) : []);
  } catch {
    currentScraps = new Set();
  }
}

async function persistScraps(){
  const user = getCurrentUser();
  if (!user) return;
  await apiCall("/api/scraps", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ nickname: user, articleIds: [...currentScraps] }),
  });
}

async function toggleScrap(articleId){
  if (!getCurrentUser()){ openAuthModal("login"); return; }
  if (currentScraps.has(articleId)) currentScraps.delete(articleId);
  else currentScraps.add(articleId);
  render();
  await persistScraps();
}

function openAuthModal(mode){
  authMode = mode;
  const isLogin = mode === "login";
  document.getElementById("authError").textContent = "";
  document.getElementById("authNickname").value = "";
  document.getElementById("authPassword").value = "";
  document.getElementById("modalTitle").textContent = isLogin ? "로그인" : "회원가입";
  document.getElementById("modalSub").textContent = isLogin ? "닉네임과 비밀번호를 입력해 주세요." : "사용할 닉네임과 비밀번호를 정해 주세요.";
  document.getElementById("authSubmitBtn").textContent = isLogin ? "로그인" : "가입하기";
  document.getElementById("modalSwitch").innerHTML = isLogin
    ? '계정이 없으신가요? <a id="switchModeLink">회원가입</a>'
    : '이미 계정이 있으신가요? <a id="switchModeLink">로그인</a>';
  document.getElementById("switchModeLink").addEventListener("click", () => openAuthModal(isLogin ? "register" : "login"));
  document.getElementById("authModal").classList.add("open");
  document.getElementById("authNickname").focus();
}

function closeAuthModal(){ document.getElementById("authModal").classList.remove("open"); }

async function handleAuthSubmit(){
  const nickname = document.getElementById("authNickname").value.trim();
  const password = document.getElementById("authPassword").value;
  const errorEl = document.getElementById("authError");
  const submitBtn = document.getElementById("authSubmitBtn");

  if (!nickname || !password){
    errorEl.textContent = "닉네임과 비밀번호를 모두 입력해 주세요.";
    return;
  }

  submitBtn.disabled = true;
  errorEl.textContent = "";
  try {
    const endpoint = authMode === "register" ? "/api/register" : "/api/login";
    const data = await apiCall(endpoint, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ nickname, password }),
    });

    if (!data.ok){
      errorEl.textContent = data.error || "처리 중 오류가 발생했습니다.";
      return;
    }

    setCurrentUser(data.nickname || nickname);
    await loadScrapsForCurrentUser();
    closeAuthModal();
    renderAuthArea();
    render();
  } catch {
    errorEl.textContent = "서버에 연결할 수 없습니다. 잠시 후 다시 시도해 주세요.";
  } finally {
    submitBtn.disabled = false;
  }
}

function logout(){
  setCurrentUser(null);
  currentScraps = new Set();
  scrapOnly = false;
  renderAuthArea();
  render();
}

function renderAuthArea(){
  const area = document.getElementById("authArea");
  const user = getCurrentUser();
  if (user){
    area.innerHTML = `<span class="user-name">${escapeHtml(user)}</span><button class="btn" id="logoutBtn" type="button">로그아웃</button>`;
    document.getElementById("logoutBtn").addEventListener("click", logout);
  } else {
    area.innerHTML = `<button class="btn btn-primary" id="loginBtn" type="button">로그인 / 회원가입</button>`;
    document.getElementById("loginBtn").addEventListener("click", () => openAuthModal("login"));
  }
}

async function init(){
  renderAuthArea();
  bindStaticEvents();

  try {
    const res = await fetch(DATA_INDEX_PATH);
    const data = await res.json();
    if (!res.ok || !data || !Array.isArray(data.dates) || !Array.isArray(data.categories)) {
      throw new Error(data.error || "기사 인덱스를 불러오지 못했습니다.");
    }
    articleIndex = data;
  } catch (err) {
    document.getElementById("resultCount").textContent = "기사 목록 로딩 실패";
    document.getElementById("articleList").innerHTML = `<div class="empty">${escapeHtml(err.message || err)}</div>`;
    return;
  }

  hydrateFilters();
  await loadScrapsForCurrentUser();
  document.getElementById("totalCount").textContent = articleIndex.totalCount || 0;
  render();
}

function bindStaticEvents(){
  document.getElementById("searchInput").addEventListener("input", render);
  document.getElementById("dateSelect").addEventListener("change", render);
  document.getElementById("scrapChip").addEventListener("click", () => {
    if (!getCurrentUser()){ openAuthModal("login"); return; }
    scrapOnly = !scrapOnly;
    document.getElementById("scrapChip").classList.toggle("active", scrapOnly);
    render();
  });
  document.getElementById("authSubmitBtn").addEventListener("click", handleAuthSubmit);
  document.getElementById("authPassword").addEventListener("keydown", e => {
    if (e.key === "Enter") handleAuthSubmit();
  });
  document.getElementById("modalCloseBtn").addEventListener("click", closeAuthModal);
  document.getElementById("authModal").addEventListener("click", e => {
    if (e.target.id === "authModal") closeAuthModal();
  });
}

function hydrateFilters(){
  const dates = articleIndex.dates.map(item => item.date);
  const dateSelect = document.getElementById("dateSelect");
  dates.forEach(d => {
    const opt = document.createElement("option");
    opt.value = d;
    opt.textContent = d;
    dateSelect.appendChild(opt);
  });
  if (dates[0]) dateSelect.value = dates[0];

  const cats = articleIndex.categories.map(item => item.category);
  const chipRow = document.getElementById("categoryChips");
  cats.forEach(c => {
    const chip = document.createElement("button");
    chip.className = "chip";
    chip.type = "button";
    chip.textContent = `${CATEGORY_ICONS[c] || c}`;
    chip.dataset.cat = c;
    chip.addEventListener("click", () => {
      if (activeCategories.has(c)){
        activeCategories.delete(c);
        chip.classList.remove("active");
      } else {
        activeCategories.add(c);
        chip.classList.add("active");
      }
      render();
    });
    chipRow.appendChild(chip);
  });
}

function escapeHtml(s){
  return String(s ?? "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
}

function highlight(text, term){
  if (!term) return escapeHtml(text);
  const safeTerm = term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
  return escapeHtml(text).replace(new RegExp(safeTerm, "gi"), m => `<mark>${m}</mark>`);
}

function isSpecificArticleLink(url){
  try {
    const u = new URL(url);
    const segments = u.pathname.replace(/\/+$/, "").split("/").filter(Boolean);
    return segments.length >= 2 || /\d{4,}/.test(u.pathname) || (segments[0] || "").length > 20;
  } catch {
    return false;
  }
}

async function render(){
  const token = ++renderToken;
  const term = document.getElementById("searchInput").value.trim();
  const date = document.getElementById("dateSelect").value;
  const user = getCurrentUser();
  const list = document.getElementById("articleList");

  document.getElementById("resultCount").textContent = "불러오는 중...";

  try {
    allArticles = await loadArticlesForCurrentFilters();
  } catch (err) {
    if (token !== renderToken) return;
    document.getElementById("resultCount").textContent = "기사 데이터 로딩 실패";
    list.innerHTML = `<div class="empty">${escapeHtml(err.message || err)}</div>`;
    return;
  }

  if (token !== renderToken) return;

  const filtered = allArticles.filter(a => {
    if (date && a.fileDate !== date) return false;
    if (activeCategories.size > 0 && !activeCategories.has(a.category)) return false;
    if (scrapOnly && !currentScraps.has(a.id)) return false;
    if (term){
      const hay = `${a.title} ${a.body} ${a.source}`.toLowerCase();
      if (!hay.includes(term.toLowerCase())) return false;
    }
    return true;
  }).sort((a,b) => (b.fileDate || "").localeCompare(a.fileDate || "") || a.id - b.id);

  document.getElementById("resultCount").textContent = `${filtered.length}건 표시 중${scrapOnly ? " (스크랩만)" : ""}`;

  if (filtered.length === 0){
    list.innerHTML = `<div class="empty">${scrapOnly ? "스크랩한 뉴스가 없습니다." : "조건에 맞는 뉴스가 없습니다."}</div>`;
    return;
  }

  list.innerHTML = filtered.map(a => {
    const isScrapped = currentScraps.has(a.id);
    const linkLabel = isSpecificArticleLink(a.link) ? "원문 보기" : "출처 사이트 보기";
    return `
      <article class="article">
        <div class="article-head">
          <h3>${highlight(a.title, term)}</h3>
          <div class="head-right">
            <span class="tag">${escapeHtml(CATEGORY_ICONS[a.category] || a.category)}</span>
            <button class="scrap-btn ${isScrapped ? "scrapped" : ""}" data-id="${a.id}" type="button" title="${user ? "스크랩" : "로그인 후 사용 가능"}">${isScrapped ? "★" : "☆"}</button>
          </div>
        </div>
        <div class="article-sub">${escapeHtml(a.fileDate)} · ${escapeHtml(a.source)}${a.date ? " · " + escapeHtml(a.date) : ""}</div>
        <div class="article-body">${highlight(a.body, term)}</div>
        ${a.link ? `<div class="article-link"><a href="${escapeHtml(a.link)}" target="_blank" rel="noopener">${linkLabel}</a></div>` : ""}
      </article>
    `;
  }).join("");

  list.querySelectorAll(".scrap-btn").forEach(btn => {
    btn.addEventListener("click", () => toggleScrap(Number(btn.dataset.id)));
  });
}

init();
</script>
</body>
</html>
